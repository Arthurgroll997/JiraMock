services:
  jsm-mock:
    build:
      context: ./jsm-mock-api
      dockerfile: Dockerfile
    container_name: jiramock-jsm
    ports:
      - "8448:8448"
    environment:
      - PORT=8448
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8448/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  pipeline-engine:
    build:
      context: ./pipeline-engine
      dockerfile: Dockerfile
    container_name: jiramock-pipeline-engine
    ports:
      - "8446:8446"
    environment:
      - PORT=8446
      - JSM_URL=http://jsm-mock:8448
    depends_on:
      jsm-mock:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8446/health"]
      interval: 30s
      timeout: 5s
      retries: 3
