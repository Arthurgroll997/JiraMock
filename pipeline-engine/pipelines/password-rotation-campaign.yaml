# =============================================================================
# Passwort-Rotations-Kampagne
# Richtlinien auflisten → Rotation auslösen → Verifizieren → Bericht
# =============================================================================

name: "Passwort-Rotations-Kampagne"
description: "Alle Passwort-Richtlinien durchgehen, Rotation auslösen, Ergebnis verifizieren und Bericht erstellen"
version: "1.0"

trigger:
  source: scheduled
  event: password-rotation-campaign

steps:
  - name: "Passwort-Richtlinien auflisten"
    system: fudo-pam
    action: password-policies.list

  - name: "Rotation für Richtlinie auslösen"
    system: fudo-pam
    action: password-policies.rotate-now
    params:
      id: "{{ vars.policy_id }}"

  - name: "Rotations-Historie prüfen"
    system: fudo-pam
    action: password-policies.history
    params:
      id: "{{ vars.policy_id }}"

  - name: "Benutzer-Zugriffs-Bericht erstellen"
    system: matrix42-esm
    action: reports.user-access

  - name: "Compliance-Bericht abrufen"
    system: matrix42-esm
    action: reports.compliance

  - name: "Abschluss-Ticket erstellen"
    system: matrix42-esm
    action: tickets.create
    params:
      title: "Passwort-Rotation abgeschlossen"
      description: "Kampagne durchgeführt. Richtlinie {{ vars.policy_id }} rotiert. Compliance-Bericht erstellt."
      category: "security-maintenance"
      priority: "low"

rollback: []
