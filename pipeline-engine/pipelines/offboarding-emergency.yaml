# =============================================================================
# Notfall-Offboarding
# Fudo Sessions beenden → Benutzer sperren → AD Gruppen entfernen → AD deaktivieren → M42 Incident
# =============================================================================

name: 'Notfall-Offboarding'
description: 'Sofortiges Offboarding bei Sicherheitsvorfall: Alle Sessions beenden, Zugriffe sperren, Incident erstellen'
version: '1.0'

trigger:
  source: security
  event: emergency-offboard

steps:
  - name: 'Aktive Fudo-Sessions auflisten'
    system: fudo-pam
    action: session-control.live

  - name: 'Fudo-Benutzer sperren'
    system: fudo-pam
    action: users.block
    params:
      id: '{{ trigger.fudo_user_id }}'

  - name: 'AD-Gruppen entfernen'
    system: active-directory
    action: bulk.group-membership
    params:
      action: 'remove'
      user: '{{ trigger.user }}'
      groups: '{{ trigger.groups }}'

  - name: 'AD-Benutzer deaktivieren'
    system: active-directory
    action: users.update
    params:
      sam: '{{ trigger.user }}'
      enabled: false

  - name: 'Incident-Ticket erstellen'
    system: matrix42-esm
    action: tickets.create
    params:
      title: 'NOTFALL-OFFBOARDING: {{ trigger.user }}'
      description: 'Benutzer {{ trigger.user }}@corp.local wurde sofort gesperrt. Fudo-Sessions beendet, AD deaktiviert.'
      category: 'security-incident'
      priority: 'critical'

  - name: 'Offboarding-Workflow in M42 starten'
    system: matrix42-esm
    action: users.offboard
    params:
      id: '{{ trigger.m42_user_id }}'

rollback: []
