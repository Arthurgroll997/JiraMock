# =============================================================================
# JIT Temporary Access — Zeitlich begrenzter Zugriff mit automatischem Widerruf
# =============================================================================

name: 'JIT Temporary Access'
description: 'Just-In-Time Zugriff: Anfrage → Genehmigung → Zeitlich begrenzte AD-Gruppe → Fudo-Sync → Wartezeit → Auto-Widerruf'
version: '1.0'

trigger:
  source: matrix42
  event: jit-access-request

steps:
  - name: 'Zugriffsanfrage erstellen'
    system: matrix42-esm
    action: access-requests.create
    params:
      user: '{{ trigger.user }}@corp.local'
      resource: '{{ trigger.group }}'
      reason: '{{ vars.reason }}'
      duration: '{{ vars.duration }}'

  - name: 'Anfrage genehmigen'
    system: matrix42-esm
    action: access-requests.approve
    params:
      id: '{{ steps.Zugriffsanfrage erstellen.result.id }}'
      approver: '{{ vars.approver }}'

  - name: 'Zeitlich begrenzte AD-Gruppenmitgliedschaft'
    system: active-directory
    action: groups.add-member-timed
    params:
      name: '{{ trigger.group }}'
      member: '{{ trigger.user }}'
      duration: '{{ vars.duration }}'

  - name: 'Fudo PAM Sync'
    system: fudo-pam
    action: user-directory.sync

  - name: 'Zugriff verifizieren'
    system: fudo-pam
    action: users.list

  - name: 'Audit-Ticket erstellen'
    system: matrix42-esm
    action: tickets.create
    params:
      title: 'JIT-Zugriff gewährt: {{ trigger.user }} → {{ trigger.group }}'
      description: 'Temporärer Zugriff für {{ vars.duration }}. Automatischer Widerruf nach Ablauf.'
      category: 'access-management'
      priority: 'medium'

  - name: 'Warten auf Ablauf'
    action: wait
    wait: '{{ vars.duration }}'

  - name: 'Zugriff widerrufen'
    system: active-directory
    action: groups.remove-member
    params:
      name: '{{ trigger.group }}'
      member: '{{ trigger.user }}'

  - name: 'Fudo Sync nach Widerruf'
    system: fudo-pam
    action: user-directory.sync

  - name: 'Widerruf dokumentieren'
    system: matrix42-esm
    action: access-requests.revoke
    params:
      id: '{{ steps.Zugriffsanfrage erstellen.result.id }}'

rollback:
  - name: 'AD-Gruppenmitgliedschaft entfernen'
    system: active-directory
    action: groups.remove-member
    params:
      name: '{{ trigger.group }}'
      member: '{{ trigger.user }}'

  - name: 'Fudo Sync'
    system: fudo-pam
    action: user-directory.sync
