name: Docker Publish

on:
  push:
    tags: ['v*']
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/pamlab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: ad-mock-api
            image: ad-mock
          - service: fudo-mock-api
            image: fudo-mock
          - service: jsm-mock-api
            image: jsm-mock
          - service: matrix42-mock-api
            image: matrix42-mock
          - service: remedy-mock-api
            image: remedy-mock
          - service: servicenow-mock-api
            image: servicenow-mock
          - service: pipeline-engine
            image: pipeline-engine
          - service: pamlab-studio
            image: studio
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
